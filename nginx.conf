server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /personal {
        try_files /personal.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
}
